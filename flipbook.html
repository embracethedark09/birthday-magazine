<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva's 22nd Birthday Special</title>
    
    <!-- Dependencies: jQuery and Turn.js for flawless book mechanics -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>
    <!-- PDF.js for rendering the PDF pages -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        :root {
            --bg-color: #1a0505; 
            --shadow-color: rgba(0, 0, 0, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.9;
        }

        .viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        /* Container framework for Turn.js */
        #flipbook {
            margin: 0 auto;
            box-shadow: 0 12px 35px var(--shadow-color);
            display: none; /* Kept hidden until PDF loads to avoid layout jumps */
        }

        #flipbook .page {
            background-color: #fff;
            width: 100%;
            height: 100%;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #loading {
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        button {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 22px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #fff;
            color: var(--bg-color);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <h1>✨ Birthday Special: 22nd Edition ✨</h1>

    <div id="loading">Assembling the masterpiece... Please wait.</div>

    <div class="viewport">
        <div id="flipbook"></div>
    </div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script>
        // Verbatim file reference to your uploaded document
        const filename = 'A4 - 11-merged.pdf';
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function initFlipbook() {
            const $loading = $('#loading');
            const $book = $('#flipbook');

            try {
                // Fetch file locally as an array buffer to bypass basic path restriction bugs
                const response = await fetch(encodeURIComponent(filename));
                if (!response.ok) throw new Error("File not found or server error");
                const arrayBuffer = await response.arrayBuffer();

                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;

                // Dynamically gauge sizes based on viewport headroom
                const firstPage = await pdf.getPage(1);
                const originalViewport = firstPage.getViewport({ scale: 1.5 });
                
                const targetHeight = Math.min(window.innerHeight * 0.70, originalViewport.height);
                const aspectRatio = originalViewport.width / originalViewport.height;
                const targetWidth = targetHeight * aspectRatio;

                // Render every single page onto individual canvas sheets sequentially
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const $pageDiv = $('<div class="page"></div>');
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');

                    const pageViewport = page.getViewport({ scale: 1.5 });
                    canvas.height = pageViewport.height;
                    canvas.width = pageViewport.width;

                    $pageDiv.append(canvas);
                    $book.append($pageDiv);

                    await page.render({ canvasContext: context, viewport: pageViewport }).promise;
                }

                // Remove loading screen and reveal layout
                $loading.hide();
                $book.show();

                // Fire up Turn.js with single cover mode enabled to clear empty margins
                $book.turn({
                    width: targetWidth * 2, // Double width for standard two-page spread layout
                    height: targetHeight,
                    autoCenter: true,
                    duration: 1000,
                    acceleration: true,
                    elevation: 50,
                    gradients: true,
                    display: 'double'
                });

                // Control Triggers
                $('#prevBtn').on('click', () => $book.turn('previous'));
                $('#nextBtn').on('click', () => $book.turn('next'));

                // Handle arrow keys natively for convenience
                $(window).on('keydown', (e) => {
                    if (e.keyCode === 37) $book.turn('previous');
                    if (e.keyCode === 39) $book.turn('next');
                });

            } catch (error) {
                console.error(error);
                $loading.text("Error loading book. Make sure 'A4 - 11-merged.pdf' is in the exact same folder on GitHub.");
            }
        }

        $(window).on('load', initFlipbook);
    </script>
</body>
</html>
