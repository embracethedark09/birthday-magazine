<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva's 22nd Birthday Special</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        :root {
            --bg-color: #1a0505; 
            --shadow-color: rgba(0, 0, 0, 0.7);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        #loading {
            color: #fff;
            font-size: 1.2rem;
        }

        .scene {
            perspective: 2500px; /* Enhanced perspective depth */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 65vh;
            width: 100%;
        }

        .book {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .sheet {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.9s cubic-bezier(0.25, 1, 0.4, 1);
            cursor: grab;
            z-index: 1;
        }

        .sheet:active {
            cursor: grabbing;
        }

        .page-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: #fff;
        }

        .page-face.front {
            z-index: 2;
            transform: rotateY(0deg);
        }

        .page-face.back {
            transform: rotateY(180deg);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .sheet.flipped {
            transform: rotateY(-180deg);
        }

        /* Organic Spine Shadow Overlay */
        .page-face::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            transition: background 0.9s cubic-bezier(0.25, 1, 0.4, 1);
        }

        /* Soft gradient fold shadow over the canvas as it closes/opens */
        .front::after {
            background: linear-gradient(to right, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 10%);
        }
        .back::after {
            background: linear-gradient(to left, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 10%);
        }

        /* Darken sheets deeply when they are mid-flip transition */
        .sheet.flipped .front::after { background: rgba(0,0,0,0.25); }
        .sheet:not(.flipped) .back::after { background: rgba(0,0,0,0.25); }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        button {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 22px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #fff;
            color: var(--bg-color);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <h1>✨ Birthday Special: 22nd Edition ✨</h1>

    <div id="loading">Assembling the flipbook spreads... Please wait.</div>

    <div class="scene">
        <div id="book" class="book"></div>
    </div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script>
        const filename = 'A4 - 11-merged.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let currentSheetIndex = 0;
        let sheets = [];
        let isDragging = false;
        let startX = 0;

        async function initBook() {
            const loadingEl = document.getElementById('loading');
            const bookContainer = document.getElementById('book');

            try {
                const response = await fetch(encodeURIComponent(filename));
                if (!response.ok) throw new Error("File not found");
                const arrayBuffer = await response.arrayBuffer();

                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;

                const targetHeight = window.innerHeight * 0.62;
                const firstPage = await pdf.getPage(1);
                const originalViewport = firstPage.getViewport({ scale: 1.0 });
                const aspectRatio = originalViewport.width / originalViewport.height;
                const singlePageWidth = targetHeight * aspectRatio;

                bookContainer.style.width = (singlePageWidth * 2) + 'px';
                bookContainer.style.height = targetHeight + 'px';

                const totalSheets = Math.ceil(totalPages / 2);

                for (let s = 0; s < totalSheets; s++) {
                    const sheetDiv = document.createElement('div');
                    sheetDiv.className = 'sheet';
                    sheetDiv.style.zIndex = totalSheets - s;

                    const frontFace = document.createElement('div');
                    frontFace.className = 'page-face front';
                    const canvasFront = document.createElement('canvas');
                    frontFace.appendChild(canvasFront);
                    sheetDiv.appendChild(frontFace);

                    const backFace = document.createElement('div');
                    backFace.className = 'page-face back';
                    const canvasBack = document.createElement('canvas');
                    backFace.appendChild(canvasBack);
                    sheetDiv.appendChild(backFace);

                    bookContainer.appendChild(sheetDiv);
                    sheets.push(sheetDiv);

                    // Front rendering
                    const frontPageNum = (s * 2) + 1;
                    if (frontPageNum <= totalPages) {
                        const page = await pdf.getPage(frontPageNum);
                        const vp = page.getViewport({ scale: 2.0 });
                        canvasFront.height = vp.height;
                        canvasFront.width = vp.width;
                        await page.render({ canvasContext: canvasFront.getContext('2d'), viewport: vp }).promise;
                    }

                    // Back rendering
                    const backPageNum = (s * 2) + 2;
                    if (backPageNum <= totalPages) {
                        const page = await pdf.getPage(backPageNum);
                        const vp = page.getViewport({ scale: 2.0 });
                        canvasBack.height = vp.height;
                        canvasBack.width = vp.width;
                        await page.render({ canvasContext: canvasBack.getContext('2d'), viewport: vp }).promise;
                    } else {
                        backFace.style.backgroundColor = 'var(--bg-color)';
                        canvasBack.style.display = 'none';
                    }
                }

                loadingEl.style.display = 'none';

                function updateBookState() {
                    sheets.forEach((sheet, index) => {
                        if (index < currentSheetIndex) {
                            sheet.classList.add('flipped');
                            // Dynamic z-index layering avoids physical page clipping during mid-flight arcing
                            sheet.style.zIndex = index + 10; 
                        } else {
                            sheet.classList.remove('flipped');
                            sheet.style.zIndex = totalSheets - index; 
                        }
                    });
                }

                // Interactive Pointer Swipe/Drag Event Configuration
                window.addEventListener('pointerdown', (e) => {
                    if (e.target.closest('.controls') || e.target.closest('button')) return;
                    isDragging = true;
                    startX = e.clientX;
                });

                window.addEventListener('pointermove', (e) => {
                    if (!isDragging) return;
                    const deltaX = e.clientX - startX;
                    
                    // Pulling page left -> Turn forward
                    if (deltaX < -60) {
                        if (currentSheetIndex < sheets.length) {
                            currentSheetIndex++;
                            updateBookState();
                            isDragging = false;
                        }
                    } 
                    // Pulling page right -> Turn backward
                    else if (deltaX > 60) {
                        if (currentSheetIndex > 0) {
                            currentSheetIndex--;
                            updateBookState();
                            isDragging = false;
                        }
                    }
                });

                window.addEventListener('pointerup', () => {
                    isDragging = false;
                });

                // Controls Fallbacks
                document.getElementById('nextBtn').addEventListener('click', () => {
                    if (currentSheetIndex < sheets.length) {
                        currentSheetIndex++;
                        updateBookState();
                    }
                });

                document.getElementById('prevBtn').addEventListener('click', () => {
                    if (currentSheetIndex > 0) {
                        currentSheetIndex--;
                        updateBookState();
                    }
                });

                $(window).on('keydown', (e) => {
                    if (e.keyCode === 37) { if (currentSheetIndex > 0) { currentSheetIndex--; updateBookState(); } }
                    if (e.keyCode === 39) { if (currentSheetIndex < sheets.length) { currentSheetIndex++; updateBookState(); } }
                });

            } catch (error) {
                console.error(error);
                loadingEl.innerText = "Error loading layouts.";
            }
        }

        window.addEventListener('DOMContentLoaded', initBook);
    </script>
</body>
</html>
