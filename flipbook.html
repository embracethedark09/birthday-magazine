<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva's 22nd Birthday Special</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        :root {
            --bg-color: #1a0505; 
            --shadow: rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: 1.3rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        #loading {
            color: #fff;
            font-size: 1.1rem;
        }

        .scene {
            perspective: 2000px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 65vh;
            width: 100%;
        }

        /* Master double-page book canvas */
        .book {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        /* A layout sheet contains front and back panels */
        .sheet {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
            cursor: grab;
        }

        .sheet:active {
            cursor: grabbing;
        }

        .page-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: #fff;
            box-shadow: inset 2px 0 15px rgba(0,0,0,0.1);
        }

        .page-face.front {
            z-index: 2;
            transform: rotateY(0deg);
        }

        .page-face.back {
            transform: rotateY(180deg);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 180 degree native rotation matrix */
        .sheet.flipped {
            transform: rotateY(-180deg);
        }

        /* Shading mask overlays for real lighting depth */
        .page-face::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            transition: background 0.7s ease;
        }
        .front::after { background: linear-gradient(to right, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0) 10%); }
        .back::after { background: linear-gradient(to left, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0) 10%); }
        .sheet.flipped .front::after { background: rgba(0,0,0,0.25); }
        .sheet:not(.flipped) .back::after { background: rgba(0,0,0,0.25); }

        .controls {
            margin-top: 35px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        button {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 22px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #fff;
            color: var(--bg-color);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <h1>✨ Birthday Special: 22nd Edition ✨</h1>

    <div id="loading">Assembling document layouts...</div>

    <div class="scene">
        <div id="book" class="book"></div>
    </div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script>
        const filename = 'A4 - 11-merged.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let currentSheetIndex = 0;
        let sheets = [];
        let startX = 0;
        let isMoving = false;

        async function initBook() {
            const loadingEl = document.getElementById('loading');
            const bookContainer = document.getElementById('book');

            try {
                const response = await fetch(encodeURIComponent(filename));
                if (!response.ok) throw new Error("File missing");
                const arrayBuffer = await response.arrayBuffer();

                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;

                const targetHeight = window.innerHeight * 0.62;
                const firstPage = await pdf.getPage(1);
                const originalViewport = firstPage.getViewport({ scale: 1.0 });
                const aspectRatio = originalViewport.width / originalViewport.height;
                const singlePageWidth = targetHeight * aspectRatio;

                // Lock total landscape canvas width to exactly 2 pages side-by-side
                bookContainer.style.width = (singlePageWidth * 2) + 'px';
                bookContainer.style.height = targetHeight + 'px';

                const totalSheets = Math.ceil(totalPages / 2);

                for (let s = 0; s < totalSheets; s++) {
                    const sheetDiv = document.createElement('div');
                    sheetDiv.className = 'sheet';
                    sheetDiv.style.zIndex = totalSheets - s;

                    const frontFace = document.createElement('div');
                    frontFace.className = 'page-face front';
                    const canvasFront = document.createElement('canvas');
                    frontFace.appendChild(canvasFront);
                    sheetDiv.appendChild(frontFace);

                    const backFace = document.createElement('div');
                    backFace.className = 'page-face back';
                    const canvasBack = document.createElement('canvas');
                    backFace.appendChild(canvasBack);
                    sheetDiv.appendChild(backFace);

                    bookContainer.appendChild(sheetDiv);
                    sheets.push(sheetDiv);

                    // Front side parsing
                    const frontPageNum = (s * 2) + 1;
                    if (frontPageNum <= totalPages) {
                        const page = await pdf.getPage(frontPageNum);
                        const vp = page.getViewport({ scale: 2.0 });
                        canvasFront.height = vp.height;
                        canvasFront.width = vp.width;
                        await page.render({ canvasContext: canvasFront.getContext('2d'), viewport: vp }).promise;
                    }

                    // Back side parsing
                    const backPageNum = (s * 2) + 2;
                    if (backPageNum <= totalPages) {
                        const page = await pdf.getPage(backPageNum);
                        const vp = page.getViewport({ scale: 2.0 });
                        canvasBack.height = vp.height;
                        canvasBack.width = vp.width;
                        await page.render({ canvasContext: canvasBack.getContext('2d'), viewport: vp }).promise;
                    } else {
                        backFace.style.backgroundColor = 'var(--bg-color)';
                        canvasBack.style.display = 'none';
                    }
                }

                loadingEl.style.display = 'none';
                updateBookState();

                function updateBookState() {
                    // Center adjustment calculation to perfectly balance cover positions 
                    if (currentSheetIndex === 0) {
                        bookContainer.style.transform = `translateX(${singlePageWidth / 2}px)`;
                    } else if (currentSheetIndex === sheets.length) {
                        bookContainer.style.transform = `translateX(${-singlePageWidth / 2}px)`;
                    } else {
                        bookContainer.style.transform = `translateX(0px)`;
                    }

                    sheets.forEach((sheet, index) => {
                        if (index < currentSheetIndex) {
                            sheet.classList.add('flipped');
                            sheet.style.zIndex = index + 50; 
                        } else {
                            sheet.classList.remove('flipped');
                            sheet.style.zIndex = totalSheets - index; 
                        }
                    });
                }

                // Native Pointer Event Listeners for seamless cursor/touch drag-swiping
                window.addEventListener('pointerdown', (e) => {
                    if (e.target.closest('.controls') || e.target.closest('button')) return;
                    isMoving = true;
                    startX = e.clientX;
                });

                window.addEventListener('pointermove', (e) => {
                    if (!isMoving) return;
                    const diffX = e.clientX - startX;

                    if (diffX < -50) { // Drag left -> turn forward
                        if (currentSheetIndex < sheets.length) {
                            currentSheetIndex++;
                            updateBookState();
                            isMoving = false;
                        }
                    } else if (diffX > 50) { // Drag right -> turn back
                        if (currentSheetIndex > 0) {
                            currentSheetIndex--;
                            updateBookState();
                            isMoving = false;
                        }
                    }
                });

                window.addEventListener('pointerup', () => isMoving = false);

                // Button Controls
                document.getElementById('nextBtn').addEventListener('click', () => {
                    if (currentSheetIndex < sheets.length) { currentSheetIndex++; updateBookState(); }
                });

                document.getElementById('prevBtn').addEventListener('click', () => {
                    if (currentSheetIndex > 0) { currentSheetIndex--; updateBookState(); }
                });

                window.addEventListener('keydown', (e) => {
                    if (e.keyCode === 37 && currentSheetIndex > 0) { currentSheetIndex--; updateBookState(); }
                    if (e.keyCode === 39 && currentSheetIndex < sheets.length) { currentSheetIndex++; updateBookState(); }
                });

            } catch (error) {
                console.error(error);
                loadingEl.innerText = "Error loading document framework.";
            }
        }

        window.addEventListener('DOMContentLoaded', initBook);
    </script>
</body>
</html>
