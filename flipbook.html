<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva's 22nd Birthday Special</title>
    
    <!-- PDF.js for rendering the PDF pages -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Page-Flip library for the 3D book animation -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #1a0505; 
            --shadow-color: rgba(0, 0, 0, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            color: #fff;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.8;
        }

        .flipbook-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            min-height: 75vh;
        }

        #flipbook {
            box-shadow: 0 12px 35px var(--shadow-color);
            background: #000;
            visibility: hidden;
        }

        .page {
            background-color: #fff;
            overflow: hidden;
            box-sizing: border-box;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #loading {
            color: #fff;
            font-size: 1.2rem;
            position: absolute;
            text-align: center;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        button {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #fff;
            color: var(--bg-color);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <h1>✨ Birthday Special: 22nd Edition ✨</h1>

    <div id="loading">Assembling the masterpiece... Please wait.</div>

    <div class="flipbook-wrapper">
        <div id="flipbook"></div>
    </div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script>
        // Verbatim file reference to your uploaded document
        const filename = 'A4 - 11-merged.pdf';
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function initFlipbook() {
            const loadingEl = document.getElementById('loading');
            const flipbookContainer = document.getElementById('flipbook');

            try {
                // Fetch file locally as an array buffer to bypass basic path restriction bugs
                const response = await fetch(encodeURIComponent(filename));
                if (!response.ok) throw new Error("File not found or server error");
                const arrayBuffer = await response.arrayBuffer();

                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;

                const firstPage = await pdf.getPage(1);
                const viewport = firstPage.getViewport({ scale: 1.5 });
                
                const pageHeight = Math.min(window.innerHeight * 0.75, viewport.height);
                const aspectRatio = viewport.width / viewport.height;
                const pageWidth = pageHeight * aspectRatio;

                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    
                    const pageElement = document.createElement('div');
                    pageElement.className = 'page';
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    
                    const pageViewport = page.getViewport({ scale: 1.5 });
                    canvas.height = pageViewport.height;
                    canvas.width = pageViewport.width;

                    pageElement.appendChild(canvas);
                    flipbookContainer.appendChild(pageElement);

                    await page.render({ canvasContext: context, viewport: pageViewport }).promise;
                }

                loadingEl.style.display = 'none';
                flipbookContainer.style.visibility = 'visible';

                const pageFlip = new St.PageFlip(flipbookContainer, {
                    width: pageWidth,
                    height: pageHeight,
                    size: "fixed",
                    minWidth: pageWidth,
                    maxWidth: pageWidth,
                    minHeight: pageHeight,
                    maxHeight: pageHeight,
                    drawShadow: true,
                    showCover: true,
                    usePortrait: false
               const pageFlip = new St.PageFlip(flipbookContainer, {
    width: pageWidth,
    height: pageHeight,
    size: "fixed",
    minWidth: pageWidth,
    maxWidth: pageWidth,
    minHeight: pageHeight,
    maxHeight: pageHeight,
    drawShadow: true,
    showCover: false,     // <-- CHANGED: Disables the hardcover mock spacing
    usePortrait: false,
    autoSize: true
    });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));

                document.getElementById('prevBtn').addEventListener('click', () => pageFlip.flipPrev());
                document.getElementById('nextBtn').addEventListener('click', () => pageFlip.flipNext());

            } catch (error) {
                console.error(error);
                loadingEl.innerText = "Error loading book. Make sure 'A4 - 11-merged.pdf' is in the exact same folder on GitHub.";
            }
        }

        window.addEventListener('DOMContentLoaded', initFlipbook);
    </script>
</body>
</html>
