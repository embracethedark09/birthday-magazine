<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva's 22nd Birthday Special</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        :root {
            --bg-color: #1a0505; 
            --shadow-color: rgba(0, 0, 0, 0.7);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0.9;
            text-align: center;
        }

        /* Container that establishes the 3D space */
        .scene {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px; /* Gives the 3D depth look */
            height: 70vh;
        }

        /* The actual book wrapper */
        .book {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        /* Individual page wrappers */
        .book-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 20px var(--shadow-color);
            cursor: pointer;
        }

        /* Canvas inside the page */
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #fff;
            backface-visibility: hidden; /* Stops page bleeding through back */
        }

        /* When a page is flipped open to the left */
        .book-page.flipped {
            transform: rotateY(-180deg);
        }

        #loading {
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        button {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 22px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #fff;
            color: var(--bg-color);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <h1>✨ Birthday Special: 22nd Edition ✨</h1>

    <div id="loading">Assembling the masterpiece... Please wait.</div>

    <div class="scene">
        <div id="book" class="book"></div>
    </div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script>
        const filename = 'A4 - 11-merged.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let currentPage = 0;
        let pages = [];

        async function initBook() {
            const loadingEl = document.getElementById('loading');
            const bookContainer = document.getElementById('book');

            try {
                const response = await fetch(encodeURIComponent(filename));
                if (!response.ok) throw new Error("File not found");
                const arrayBuffer = await response.arrayBuffer();

                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;

                // Determine exact responsive dimension sizing
                const targetHeight = window.innerHeight * 0.65;
                const firstPage = await pdf.getPage(1);
                const originalViewport = firstPage.getViewport({ scale: 1.0 });
                const aspectRatio = originalViewport.width / originalViewport.height;
                const targetWidth = targetHeight * aspectRatio;

                // Apply width/height variables dynamically to the layout
                bookContainer.style.width = targetWidth + 'px';
                bookContainer.style.height = targetHeight + 'px';

                // Render every PDF page into a clean canvas slot
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'book-page';
                    // Stacking context z-indexing so first page sits on top
                    pageDiv.style.zIndex = totalPages - pageNum; 

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');

                    const pageViewport = page.getViewport({ scale: 2.0 }); // High-DPI crisp scale
                    canvas.height = pageViewport.height;
                    canvas.width = pageViewport.width;

                    pageDiv.appendChild(canvas);
                    bookContainer.appendChild(pageDiv);
                    pages.push(pageDiv);

                    await page.render({ canvasContext: context, viewport: pageViewport }).promise;
                }

                loadingEl.style.display = 'none';

                // Shift book slightly to the right on layout initialization so cover looks perfectly centered
                bookContainer.style.transform = `translateX(${targetWidth / 2}px)`;

                // Turn page forwarding functions
                function updateBookState() {
                    // Adjust the root spine anchor as it flips open to keep the spread centered
                    if (currentPage === 0) {
                        bookContainer.style.transform = `translateX(${targetWidth / 2}px)`;
                    } else if (currentPage === totalPages) {
                        bookContainer.style.transform = `translateX(${-targetWidth / 2}px)`;
                    } else {
                        bookContainer.style.transform = `translateX(0px)`;
                    }

                    pages.forEach((page, index) => {
                        if (index < currentPage) {
                            page.classList.add('flipped');
                            page.style.zIndex = index; // Move flipped pages out of view index sequence
                        } else {
                            page.classList.remove('flipped');
                            page.style.zIndex = totalPages - index; // Maintain layer ordering stack
                        }
                    });
                }

                document.getElementById('nextBtn').addEventListener('click', () => {
                    if (currentPage < totalPages) {
                        currentPage++;
                        updateBookState();
                    }
                });

                document.getElementById('prevBtn').addEventListener('click', () => {
                    if (currentPage > 0) {
                        currentPage--;
                        updateBookState();
                    }
                });

                // Clicking directly on pages to flip them forwards
                pages.forEach((page, idx) => {
                    page.addEventListener('click', () => {
                        if (idx === currentPage) {
                            currentPage++;
                        } else if (idx === currentPage - 1) {
                            currentPage--;
                        }
                        updateBookState();
                    });
                });

            } catch (error) {
                console.error(error);
                loadingEl.innerText = "Error loading book layout. Ensure paths match exactly.";
            }
        }

        window.addEventListener('DOMContentLoaded', initBook);
    </script>
</body>
</html>
