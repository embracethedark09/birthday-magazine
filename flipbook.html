<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva's 22nd Birthday Special</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #1a0505; 
            --shadow-color: rgba(0, 0, 0, 0.7);
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0.9;
            text-align: center;
        }

        .viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 65vh;
        }

        /* The canvas framework container required by PageFlip */
        #flipbook {
            box-shadow: 0 12px 40px var(--shadow-color);
            visibility: hidden; /* Kept hidden until pages render perfectly */
        }

        .page {
            background-color: #fff;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #loading {
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .controls {
            margin-top: 35px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        button {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 22px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #fff;
            color: var(--bg-color);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <h1>✨ Birthday Special: 22nd Edition ✨</h1>

    <div id="loading">Assembling the flipbook spreads... Please wait.</div>

    <div class="viewport">
        <div id="flipbook"></div>
    </div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script>
        const filename = 'A4 - 11-merged.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function initBook() {
            const loadingEl = document.getElementById('loading');
            const flipbookContainer = document.getElementById('flipbook');

            try {
                const response = await fetch(encodeURIComponent(filename));
                if (!response.ok) throw new Error("File not found");
                const arrayBuffer = await response.arrayBuffer();

                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;

                // Scale sizes to match screen space bounds cleanly
                const targetHeight = window.innerHeight * 0.62;
                const firstPage = await pdf.getPage(1);
                const originalViewport = firstPage.getViewport({ scale: 1.0 });
                const aspectRatio = originalViewport.width / originalViewport.height;
                const singlePageWidth = targetHeight * aspectRatio;

                // Render all pages as high-res canvas layers sequentially
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');

                    const pageViewport = page.getViewport({ scale: 2.0 }); // 2x scale for sharp graphics
                    canvas.height = pageViewport.height;
                    canvas.width = pageViewport.width;

                    pageDiv.appendChild(canvas);
                    flipbookContainer.appendChild(pageDiv);

                    await page.render({ canvasContext: context, viewport: pageViewport }).promise;
                }

                loadingEl.style.display = 'none';
                flipbookContainer.style.visibility = 'visible';

                // Initialize the professional engine
                const pageFlip = new St.PageFlip(flipbookContainer, {
                    width: singlePageWidth,
                    height: targetHeight,
                    size: "fixed",
                    minWidth: singlePageWidth,
                    maxWidth: singlePageWidth,
                    minHeight: targetHeight,
                    maxHeight: targetHeight,
                    drawShadow: true,
                    showCover: false,      // Removes empty back borders entirely
                    usePortrait: false,    // Forces clean side-by-side spreads on landscape windows
                    flippingTime: 1000,
                    swipeDistance: 30,     // Drag sensitivity parameter
                    useMouseEvents: true   // Explicitly allows desktop mouse dragging/swiping
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));

                // Connect Control Buttons
                document.getElementById('prevBtn').addEventListener('click', () => pageFlip.flipPrev());
                document.getElementById('nextBtn').addEventListener('click', () => pageFlip.flipNext());

                // Hotkey bindings for convenience
                window.addEventListener('keydown', (e) => {
                    if (e.keyCode === 37) pageFlip.flipPrev();
                    if (e.keyCode === 39) pageFlip.flipNext();
                });

            } catch (error) {
                console.error(error);
                loadingEl.innerText = "Error initializing engine parameters.";
            }
        }

        window.addEventListener('DOMContentLoaded', initBook);
    </script>
</body>
</html>
