<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva's 22nd Birthday Special</title>
    
    <!-- Page-Flip library for the 3D book animation -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #1a0505; 
            --shadow-color: rgba(0, 0, 0, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            color: #fff;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.8;
        }

        .flipbook-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1200px;
        }

        #flipbook {
            box-shadow: 0 12px 35px var(--shadow-color);
            background: #000;
        }

        .page {
            background-color: #1a0505;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        button {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #fff;
            color: var(--bg-color);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <h1>✨ Birthday Special: 22nd Edition ✨</h1>

    <div class="flipbook-wrapper">
        <div id="flipbook">
            <!-- Hardcoded image pages directly from the source layout -->
            <div class="page"><img src="https://g.co/gemini/share/a/input_file_0.png" alt="Page 1"></div>
            <div class="page"><img src="https://g.co/gemini/share/a/input_file_1.png" alt="Page 2"></div>
            <div class="page"><img src="https://g.co/gemini/share/a/input_file_2.png" alt="Page 3"></div>
            <div class="page"><img src="https://g.co/gemini/share/a/input_file_3.png" alt="Page 4"></div>
            <div class="page"><img src="https://g.co/gemini/share/a/input_file_4.png" alt="Page 5"></div>
            <div class="page"><img src="https://g.co/gemini/share/a/input_file_5.png" alt="Page 6"></div>
            <div class="page"><img src="https://g.co/gemini/share/a/input_file_6.png" alt="Page 7"></div>
            <div class="page"><img src="https://g.co/gemini/share/a/input_file_7.png" alt="Page 8"></div>
            <div class="page"><img src="https://g.co/gemini/share/a/input_file_8.png" alt="Page 9"></div>
            <div class="page"><img src="https://g.co/gemini/share/a/input_file_9.png" alt="Page 10"></div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const flipbookContainer = document.getElementById('flipbook');

            // Based on standard A4 portrait ratio aspect dimensions
            const pageHeight = Math.min(window.innerHeight * 0.75, 842);
            const pageWidth = pageHeight * (595 / 842);

            const pageFlip = new St.PageFlip(flipbookContainer, {
                width: pageWidth,
                height: pageHeight,
                size: "fixed",
                minWidth: pageWidth,
                maxWidth: pageWidth,
                minHeight: pageHeight,
                maxHeight: pageHeight,
                drawShadow: true,
                showCover: true,
                usePortrait: false
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            document.getElementById('prevBtn').addEventListener('click', () => pageFlip.flipPrev());
            document.getElementById('nextBtn').addEventListener('click', () => pageFlip.flipNext());
        });
    </script>
</body>
</html>
