<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva's 22nd Birthday Special</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        :root {
            --bg-color: #1a0505; 
            --shadow-color: rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        #loading {
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* 3D Scene Wrapper */
        .scene {
            perspective: 2000px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 65vh;
            width: 100%;
        }

        /* The overall double-page book frame */
        .book {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        /* A "Sheet" holds two pages: a front page and a back page */
        .sheet {
            position: absolute;
            top: 0;
            right: 0; /* Align all sheets to the right half of the book initially */
            width: 50%;
            height: 100%;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        /* Common styles for front and back faces of each sheet */
        .page-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: #fff;
            box-shadow: inset 3px 0 20px rgba(0,0,0,0.1);
        }

        /* Front face points towards user */
        .page-face.front {
            z-index: 2;
            transform: rotateY(0deg);
        }

        /* Back face points away; mirrored horizontally */
        .page-face.back {
            transform: rotateY(180deg);
        }

        /* Canvas rendering element styles */
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Class applied when a sheet is flipped to the left side */
        .sheet.flipped {
            transform: rotateY(-180deg);
        }

        /* Shading/Shadow overlay effect during flip transitions */
        .page-face::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0);
            transition: background 0.8s ease;
            pointer-events: none;
        }
        .sheet.flipped .front::after { background: rgba(0,0,0,0.2); }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        button {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 22px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #fff;
            color: var(--bg-color);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <h1>✨ Birthday Special: 22nd Edition ✨</h1>

    <div id="loading">Assembling the flipbook spreads... Please wait.</div>

    <div class="scene">
        <div id="book" class="book"></div>
    </div>

    <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
    </div>

    <script>
        const filename = 'A4 - 11-merged.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let currentSheetIndex = 0;
        let sheets = [];

        async function initBook() {
            const loadingEl = document.getElementById('loading');
            const bookContainer = document.getElementById('book');

            try {
                const response = await fetch(encodeURIComponent(filename));
                if (!response.ok) throw new Error("File not found");
                const arrayBuffer = await response.arrayBuffer();

                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;

                // Scale sizes to match screen space bounds cleanly
                const targetHeight = window.innerHeight * 0.62;
                const firstPage = await pdf.getPage(1);
                const originalViewport = firstPage.getViewport({ scale: 1.0 });
                const aspectRatio = originalViewport.width / originalViewport.height;
                const singlePageWidth = targetHeight * aspectRatio;

                // Set full book wrapper dimension to exactly 2 pages wide
                bookContainer.style.width = (singlePageWidth * 2) + 'px';
                bookContainer.style.height = targetHeight + 'px';

                // We generate double-sided sheets dynamically.
                // Sheet 1: Front = Page 1 (Cover), Back = Page 2
                // Sheet 2: Front = Page 3, Back = Page 4... up to Page 10
                const totalSheets = Math.ceil(totalPages / 2);

                for (let s = 0; s < totalSheets; s++) {
                    const sheetDiv = document.createElement('div');
                    sheetDiv.className = 'sheet';
                    sheetDiv.style.zIndex = totalSheets - s;

                    // Front face container
                    const frontFace = document.createElement('div');
                    frontFace.className = 'page-face front';
                    const canvasFront = document.createElement('canvas');
                    frontFace.appendChild(canvasFront);
                    sheetDiv.appendChild(frontFace);

                    // Back face container
                    const backFace = document.createElement('div');
                    backFace.className = 'page-face back';
                    const canvasBack = document.createElement('canvas');
                    backFace.appendChild(canvasBack);
                    sheetDiv.appendChild(backFace);

                    bookContainer.appendChild(sheetDiv);
                    sheets.push(sheetDiv);

                    // Render front page of this sheet
                    const frontPageNum = (s * 2) + 1;
                    if (frontPageNum <= totalPages) {
                        const page = await pdf.getPage(frontPageNum);
                        const vp = page.getViewport({ scale: 2.0 });
                        canvasFront.height = vp.height;
                        canvasFront.width = vp.width;
                        await page.render({ canvasContext: canvasFront.getContext('2d'), viewport: vp }).promise;
                    }

                    // Render back page of this sheet
                    const backPageNum = (s * 2) + 2;
                    if (backPageNum <= totalPages) {
                        const page = await pdf.getPage(backPageNum);
                        const vp = page.getViewport({ scale: 2.0 });
                        canvasBack.height = vp.height;
                        canvasBack.width = vp.width;
                        await page.render({ canvasContext: canvasBack.getContext('2d'), viewport: vp }).promise;
                    } else {
                        // If odd number of pages, keep the back cover plain dark crimson color matching background
                        backFace.style.backgroundColor = 'var(--bg-color)';
                        canvasBack.style.display = 'none';
                    }
                }

                loadingEl.style.display = 'none';

                function updateBookState() {
                    sheets.forEach((sheet, index) => {
                        if (index < currentSheetIndex) {
                            // Sheet is flipped to the left side
                            sheet.classList.add('flipped');
                            sheet.style.zIndex = index + 1; 
                        } else {
                            // Sheet stays on the right side
                            sheet.classList.remove('flipped');
                            sheet.style.zIndex = totalSheets - index; 
                        }
                    });
                }

                document.getElementById('nextBtn').addEventListener('click', () => {
                    if (currentSheetIndex < sheets.length) {
                        currentSheetIndex++;
                        updateBookState();
                    }
                });

                document.getElementById('prevBtn').addEventListener('click', () => {
                    if (currentSheetIndex > 0) {
                        currentSheetIndex--;
                        updateBookState();
                    }
                });

                // Let user click directly on pages to flip them back or forth
                sheets.forEach((sheet, idx) => {
                    sheet.addEventListener('click', (e) => {
                        if (idx === currentSheetIndex) {
                            currentSheetIndex++;
                        } else if (idx === currentSheetIndex - 1) {
                            currentSheetIndex--;
                        }
                        updateBookState();
                    });
                });

            } catch (error) {
                console.error(error);
                loadingEl.innerText = "Error configuring spreads. Double check filename paths.";
            }
        }

        window.addEventListener('DOMContentLoaded', initBook);
    </script>
</body>
</html>
